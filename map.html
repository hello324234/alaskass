<script>

const map = L.map('map-canvas', {
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 1,
    zoomSnap: 0.5
});

const bounds = [[0,0],[3120,3120]];

L.imageOverlay(
'https://alpha.duckybot.xyz/assets/erlc-map.png',
bounds
).addTo(map);

map.fitBounds(bounds);

let markers = {};

const fallbackAvatar =
"https://tr.rbxcdn.com/38c6ed8c6330335bc0a2a057b5a87e00/150/150/AvatarHeadshot/Png";


function getTeamColor(team){

    if(team.includes("Police")) return "#2563eb";

    if(team.includes("Sheriff")) return "#d97706";

    if(team.includes("Fire") || team.includes("EMS")) return "#dc2626";

    if(team.includes("DOT")) return "#f59e0b";

    return "#ffffff";

}


function focusPlayer(y,x,name){

    map.flyTo([y,x],0,{duration:1.5});

    setTimeout(()=>{
        if(markers[name]) markers[name].openPopup();
    },1600);

}


async function syncData(){

try{

    const response = await fetch('/api/erlc-map-api');

    const data = await response.json();

    document.getElementById('stat-pop').innerText =
    `${data.CurrentPlayers}/${data.MaxPlayers} Players`;

    document.getElementById('stat-time').innerText =
    new Date().toLocaleTimeString();

    document.getElementById('sync-text').innerText =
    "LIVE CONNECTION";

    document.getElementById('sync-dot').classList.add('active');

    const currentNames = [];

    const listContainer =
    document.getElementById('player-list-container');

    let listHTML = '';

    data.Players.forEach(p=>{

        const parts = p.Player.split(':');

        const name = parts[0];

        const userId = parts[1];

        currentNames.push(name);

        // ✅ FIXED AVATAR URL
        const avatarUrl =
        `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=150&height=150&format=png`;

        const y = 3120 - p.Location.LocationZ;

        const x = p.Location.LocationX;

        const color = getTeamColor(p.Team);

        const label =
        p.Callsign ? `${name} [${p.Callsign}]` : name;


        const popupHTML = `
        <div style="text-align:center;padding:10px;">
            <img src="${avatarUrl}"
            onerror="this.src='${fallbackAvatar}'"
            style="width:70px;height:70px;border-radius:50%;
            border:2px solid ${color};margin-bottom:8px;">
            <div style="font-weight:800;">${name}</div>
            <div style="font-size:10px;color:#94a3b8;">
            UID:${userId}
            </div>
            <div style="font-size:11px;">
            <b>Team:</b>
            <span style="color:${color}">
            ${p.Team}
            </span>
            </div>
        </div>
        `;


        if(markers[name]){

            markers[name].setLatLng([y,x]);

            markers[name].setPopupContent(popupHTML);

        }else{

            markers[name] =
            L.circleMarker([y,x],{

                radius:6,
                color:color,
                fillOpacity:1,
                weight:2

            })
            .addTo(map)
            .bindTooltip(label,{
                permanent:true,
                direction:'top',
                className:'unit-label'
            })
            .bindPopup(popupHTML);

        }


        listHTML += `
        <div class="player-item"
        onclick="focusPlayer(${y},${x},'${name}')">

            <img src="${avatarUrl}"
            onerror="this.src='${fallbackAvatar}'">

            <div class="player-info">

                <div class="name">${label}</div>

                <div class="team"
                style="color:${color}">
                ${p.Team}
                </div>

            </div>

        </div>
        `;

    });


    listContainer.innerHTML = listHTML;


    Object.keys(markers).forEach(name=>{

        if(!currentNames.includes(name)){

            map.removeLayer(markers[name]);

            delete markers[name];

        }

    });

}catch{

    document.getElementById('sync-text').innerText =
    "API ERROR";

    document.getElementById('sync-dot').classList.remove('active');

}

}


setInterval(syncData,10000);

syncData();

</script>
