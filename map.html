<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alaska State | Tactical Live Map</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
:root {
--bg:#050505;--bg-soft:#0d0d11;--border:rgba(255,255,255,0.08);
--text-dim:#94a3b8;--accent:#38bdf8;--glass:rgba(15,15,18,0.7);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
body{background:var(--bg);color:white;overflow:hidden;height:100vh;}

.nav-container{position:fixed;top:15px;left:50%;transform:translateX(-50%);width:95%;z-index:1000;}
nav{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);
border-radius:100px;padding:10px 25px;display:flex;justify-content:space-between;align-items:center;}

.status-pill{font-size:0.7rem;color:var(--text-dim);display:flex;align-items:center;
gap:8px;background:rgba(0,0,0,0.3);padding:5px 12px;border-radius:50px;border:1px solid var(--border);}
.live-dot{width:7px;height:7px;background:#444;border-radius:50%;}
.live-dot.active{background:#22c55e;box-shadow:0 0 10px #22c55e;}

.main-container{display:flex;height:100vh;padding-top:85px;gap:15px;padding:85px 15px 15px 15px;}

.sidebar{width:320px;background:var(--bg-soft);border:1px solid var(--border);
border-radius:20px;display:flex;flex-direction:column;overflow:hidden;}

.sidebar-header{padding:20px;border-bottom:1px solid var(--border);}
.sidebar-header h2{font-size:1rem;font-weight:800;color:var(--accent);}

.player-list{flex:1;overflow-y:auto;padding:10px;}

.player-item{
display:flex;align-items:center;gap:12px;padding:10px;border-radius:12px;
cursor:pointer;transition:0.2s;border:1px solid transparent;margin-bottom:5px;
}
.player-item:hover{background:rgba(255,255,255,0.03);border-color:var(--border);}

.player-item img{
width:35px;height:35px;border-radius:50%;background:#1a1a20;object-fit:cover;
}

.player-info{flex:1;overflow:hidden;}
.player-info .name{font-weight:700;font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-info .team{font-size:0.7rem;color:var(--text-dim);}

.map-wrapper{flex:1;position:relative;border-radius:20px;overflow:hidden;border:1px solid var(--border);}
#map-canvas{width:100%;height:100%;background:#08080a;}

.unit-label{
background:rgba(0,0,0,0.9);
border:1px solid var(--accent);
color:white;padding:2px 6px;border-radius:4px;
font-size:10px;font-weight:800;
pointer-events:none;
}
</style>
</head>

<body>

<div class="nav-container">
<nav>
<div style="font-weight:800;">ALASKA <span style="color:#38bdf8">STATE</span></div>
<div style="display:flex;gap:20px;font-size:0.8rem;font-weight:600;">
<span id="stat-pop">0/0 Players</span>
<span id="stat-time">--:--:--</span>
</div>
<div class="status-pill">
<div id="sync-dot" class="live-dot"></div>
<span id="sync-text">CONNECTING</span>
</div>
</nav>
</div>

<div class="main-container">

<div class="sidebar">
<div class="sidebar-header">
<h2>ACTIVE UNITS</h2>
</div>
<div id="player-list-container" class="player-list"></div>
</div>

<div class="map-wrapper">
<div id="map-canvas"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map-canvas',{
crs:L.CRS.Simple,
minZoom:-2,
maxZoom:1,
zoomSnap:0.5
});

const bounds=[[0,0],[3120,3120]];

L.imageOverlay(
'https://alpha.duckybot.xyz/assets/erlc-map.png',
bounds
).addTo(map);

map.fitBounds(bounds);

let markers={};

const avatarCache={};

const fallbackAvatar=
"https://tr.rbxcdn.com/38c6ed8c6330335bc0a2a057b5a87e00/150/150/AvatarHeadshot/Png";


// FIXED AVATAR FUNCTION
async function getAvatar(userId){

if(avatarCache[userId])
return avatarCache[userId];

try{

const res=await fetch(
`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=150x150&format=Png&isCircular=true`
);

const json=await res.json();

const url=json.data[0].imageUrl || fallbackAvatar;

avatarCache[userId]=url;

return url;

}catch{

return fallbackAvatar;

}

}



function getTeamColor(team){

if(team.includes("Police"))return "#2563eb";

if(team.includes("Sheriff"))return "#d97706";

if(team.includes("Fire")||team.includes("EMS"))return "#dc2626";

if(team.includes("DOT"))return "#f59e0b";

return "#ffffff";

}



function focusPlayer(y,x,name){

map.flyTo([y,x],0,{duration:1.5});

setTimeout(()=>{
if(markers[name])
markers[name].openPopup();
},1600);

}



async function syncData(){

try{

const response=await fetch('/api/erlc-map-api');

const data=await response.json();

document.getElementById('stat-pop').innerText=
`${data.CurrentPlayers}/${data.MaxPlayers} Players`;

document.getElementById('stat-time').innerText=
new Date().toLocaleTimeString();

document.getElementById('sync-text').innerText="LIVE CONNECTION";

document.getElementById('sync-dot').classList.add('active');

const currentNames=[];

const listContainer=
document.getElementById('player-list-container');

let listHTML='';



for(const p of data.Players){

const parts=p.Player.split(':');

const name=parts[0];

const userId=parts[1];

currentNames.push(name);

const avatarUrl=await getAvatar(userId);

const y=3120-p.Location.LocationZ;

const x=p.Location.LocationX;

const color=getTeamColor(p.Team);

const label=p.Callsign?
`${name} [${p.Callsign}]`:name;



const popupHTML=`
<div style="text-align:center;padding:10px;">
<img src="${avatarUrl}"
style="width:70px;height:70px;border-radius:50%;border:2px solid ${color};margin-bottom:8px;">
<div style="font-weight:800;">${name}</div>
<div style="font-size:10px;color:#94a3b8;">
UID:${userId}
</div>
<div style="font-size:11px;margin-top:6px;">
<b>Team:</b>
<span style="color:${color}">
${p.Team}
</span>
</div>
</div>
`;


if(markers[name]){

markers[name].setLatLng([y,x]);

markers[name].setPopupContent(popupHTML);

}else{

markers[name]=L.circleMarker([y,x],{

radius:6,
color:color,
fillOpacity:1,
weight:2

})
.addTo(map)
.bindTooltip(label,{
permanent:true,
direction:'top',
className:'unit-label'
})
.bindPopup(popupHTML);

}



listHTML+=`
<div class="player-item"
onclick="focusPlayer(${y},${x},'${name}')">

<img src="${avatarUrl}">

<div class="player-info">

<div class="name">${label}</div>

<div class="team"
style="color:${color}">

${p.Team}

</div>

</div>

</div>
`;

}



listContainer.innerHTML=listHTML;



Object.keys(markers).forEach(name=>{

if(!currentNames.includes(name)){

map.removeLayer(markers[name]);

delete markers[name];

}

});

}catch{

document.getElementById('sync-text').innerText="API ERROR";

document.getElementById('sync-dot').classList.remove('active');

}

}



setInterval(syncData,10000);

syncData();

</script>

</body>
</html>
