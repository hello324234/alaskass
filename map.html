<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERLC Live Map | Alaska State</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --bg: #050505; --bg-soft: #0d0d11; --border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8; --accent: #38bdf8; --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; }

        /* Reuse your premium navigation style */
        .nav-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1100px; z-index: 1000; }
        nav { background: rgba(15,15,18,0.7); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 100px; padding: 14px 35px; display: flex; justify-content: space-between; align-items: center; }
        
        .page-header { padding: 160px 10% 60px; text-align: center; }
        .map-section { padding: 0 10% 120px; max-width: 1400px; margin: 0 auto; }

        /* The Panel and Map */
        .panel { background: #0a0a0d; border: 1px solid var(--border); border-radius: 30px; padding: 24px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); }
        #map-canvas { width: 100%; height: 600px; border-radius: 20px; background: #000; border: 1px solid var(--border); }

        .stat-card { background: rgba(8, 8, 12, 0.8); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 20px; }
        .unit-label { background: #000; color: #fff; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--accent); font-size: 10px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="nav-container">
        <nav>
            <div style="font-weight: 800;">ALASKA STATE</div>
            <div id="status" style="font-size: 0.8rem; color: var(--text-dim);"><i class="fa-solid fa-circle" style="color: grey;"></i> Connecting...</div>
        </nav>
    </div>

    <section class="page-header">
        <h1 style="font-size: 3rem; font-weight: 800;">Live Asset Tracking</h1>
        <p style="color: var(--text-dim);">Real-time GPS coordinate pinpointing for all active server units.</p>
    </section>

    <section class="map-section">
        <div class="panel">
            <div id="map-canvas"></div>
            <div style="margin-top: 20px; color: var(--text-dim); font-size: 0.9rem;">
                <i class="fa-solid fa-info-circle"></i> Map updates automatically every 15 seconds. Coordinates are synced via ERLC API v2.
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Set up the map engine
        const map = L.map('map-canvas', { crs: L.CRS.Simple, minZoom: -3 });
        map.setView([0, 0], -2);

        let markers = {};

        function getMarkerColor(team) {
            if (team.includes("Police")) return "#2563eb";
            if (team.includes("Sheriff")) return "#d97706";
            if (team.includes("Fire") || team.includes("EMS")) return "#dc2626";
            return "#ffffff";
        }

        async function updateMap() {
            try {
                // Fetch from your NEW backend file
                const response = await fetch('/api/map-data');
                const data = await response.json();

                if (!data.Players) return;

                document.getElementById('status').innerHTML = `<i class="fa-solid fa-circle" style="color: #22c55e;"></i> LIVE: ${data.CurrentPlayers} Online`;

                const currentActive = [];

                data.Players.forEach(p => {
                    const name = p.Player.split(':')[0];
                    currentActive.push(name);
                    
                    // ER:LC v2 Coordinates (Y-Axis is Z in Roblox)
                    const pos = [p.Location.LocationZ / 5, p.Location.LocationX / 5];

                    if (markers[name]) {
                        markers[name].setLatLng(pos);
                    } else {
                        markers[name] = L.circleMarker(pos, {
                            radius: 7,
                            color: getMarkerColor(p.Team),
                            fillOpacity: 1,
                            weight: 2
                        }).addTo(map).bindTooltip(name, { permanent: true, direction: 'top', className: 'unit-label' });
                    }
                });

                // Clear players who left
                Object.keys(markers).forEach(m => {
                    if (!currentActive.includes(m)) {
                        map.removeLayer(markers[m]);
                        delete markers[m];
                    }
                });

            } catch (err) {
                document.getElementById('status').innerHTML = `<i class="fa-solid fa-circle" style="color: #ef4444;"></i> API ERROR`;
            }
        }

        setInterval(updateMap, 15000);
        updateMap();
    </script>
</body>
</html>
