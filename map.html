<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alaska State | Tactical Live Map</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --bg: #050505; --bg-soft: #0d0d11; --border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8; --accent: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        /* Navigation */
        .nav-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 1200px; z-index: 1000; }
        nav { background: rgba(15, 15, 18, 0.7); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 100px; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; }
        
        .status-pill { font-size: 0.75rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 6px 15px; border-radius: 50px; border: 1px solid var(--border); }
        .live-dot { width: 8px; height: 8px; background: #444; border-radius: 50%; transition: 0.3s; }
        .live-dot.active { background: #22c55e; box-shadow: 0 0 10px #22c55e; }

        /* Layout */
        .wrapper { padding: 130px 5% 50px; max-width: 1600px; margin: 0 auto; }
        .header-area { text-align: center; margin-bottom: 40px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--bg-soft); border: 1px solid var(--border); padding: 20px; border-radius: 20px; }
        .stat-box small { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; font-weight: 700; }
        .stat-box div { font-size: 1.4rem; font-weight: 800; margin-top: 5px; color: var(--accent); }

        /* Controls (Search & Filter) */
        .controls-bar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .control-input { flex: 1; min-width: 250px; background: var(--bg-soft); border: 1px solid var(--border); color: white; padding: 15px 20px; border-radius: 15px; outline: none; transition: 0.2s; font-size: 0.95rem; }
        .control-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        select.control-input { flex: 0.3; min-width: 180px; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 1rem top 50%; background-size: 0.65rem auto; }

        /* Map */
        .map-card { background: var(--bg-soft); border: 1px solid var(--border); border-radius: 30px; padding: 20px; position: relative; }
        #map-canvas { width: 100%; height: 70vh; border-radius: 20px; background: #08080a; border: 1px solid rgba(255,255,255,0.03); }

        .unit-label { background: rgba(0, 0, 0, 0.9); border: 1px solid var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; border-width: 1px; }

        /* Leaflet Custom Popups */
        .leaflet-popup-content-wrapper { background: #121218; border: 1px solid var(--border); border-radius: 16px; color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .leaflet-popup-tip { background: #121218; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
        .leaflet-container a.leaflet-popup-close-button { color: var(--text-dim); top: 10px; right: 10px; }
        .leaflet-container a.leaflet-popup-close-button:hover { color: white; }

        .profile-popup { display: flex; gap: 15px; align-items: center; min-width: 230px; padding: 5px; }
        /* Forces the image to be a circle/square headshot depending on border-radius */
        .profile-popup img { width: 65px; height: 65px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; background: #222; }
        .profile-popup .info h3 { margin: 0 0 4px 0; font-size: 1.1rem; font-weight: 800; }
        .profile-popup .info p { margin: 2px 0; font-size: 0.8rem; color: var(--text-dim); }
        
        .badge-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; color: white; text-transform: uppercase; letter-spacing: 0.5px;}
    </style>
</head>
<body>

    <div class="nav-container">
        <nav>
            <div style="font-weight: 800;">ALASKA <span style="color: var(--accent)">STATE</span></div>
            <div class="status-pill"><div id="sync-dot" class="live-dot"></div><span id="sync-text">INITIALIZING</span></div>
        </nav>
    </div>

    <div class="wrapper">
        <div class="header-area">
            <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">Live Asset Tracking</h1>
            <p style="color: var(--text-dim);">Real-time GPS coordinate pinpointing for all active server units.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <small>Server Population</small>
                <div id="stat-pop">0 / 40</div>
            </div>
            <div class="stat-box">
                <small>Active Units Displayed</small> 
                <div id="stat-units">0</div>
            </div>
            <div class="stat-box">
                <small>Last Data Fetch</small>
                <div id="stat-time">--:--:--</div>
            </div>
        </div>

        <div class="controls-bar">
            <input type="text" id="search-input" class="control-input" placeholder="Search by Username or Callsign...">
            <select id="team-filter" class="control-input">
                <option value="all">🌐 All Units</option>
                <option value="pd">🚓 Police</option>
                <option value="sheriff">🚔 Sheriff</option>
                <option value="fd">🚑 Fire & EMS</option>
                <option value="dot">🚧 DOT</option>
                <option value="civ">🧑 Civilians</option>
                <option value="staff">🛡️ Server Staff</option>
            </select>
        </div>

        <div class="map-card">
            <div id="map-canvas"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Map Initialization
        const map = L.map('map-canvas', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 1 });
        const bounds = [[0, 0], [3120, 3120]];
        L.imageOverlay('https://alpha.duckybot.xyz/assets/erlc-map.png', bounds).addTo(map);
        map.fitBounds(bounds);

        let markers = {};
        let latestData = { Players: [] };
        
        // Filter States
        let currentSearch = "";
        let currentFilter = "all";

        document.getElementById('search-input').addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderMap();
        });

        document.getElementById('team-filter').addEventListener('change', (e) => {
            currentFilter = e.target.value.toLowerCase();
            renderMap();
        });

        function getTeamColor(team) {
            team = team.toLowerCase();
            if (team.includes("police")) return "#2563eb";
            if (team.includes("sheriff")) return "#d97706";
            if (team.includes("fire") || team.includes("ems")) return "#dc2626";
            if (team.includes("dot")) return "#f59e0b";
            return "#ffffff"; // Civilians / Unknown
        }

        function checkFilterMatch(player) {
            const team = (player.Team || "").toLowerCase();
            const cleanName = player.Player.split(':')[0].toLowerCase();
            const callsign = (player.Callsign || "").toLowerCase();
            const permission = (player.Permission || "Normal").toLowerCase();

            // Check Search
            if (currentSearch && !cleanName.includes(currentSearch) && !callsign.includes(currentSearch)) {
                return false;
            }

            // Check Dropdown Filter
            if (currentFilter === "all") return true;
            if (currentFilter === "pd" && team.includes("police")) return true;
            if (currentFilter === "sheriff" && team.includes("sheriff")) return true;
            if (currentFilter === "fd" && (team.includes("fire") || team.includes("ems"))) return true;
            if (currentFilter === "dot" && team.includes("dot")) return true;
            if (currentFilter === "civ" && (team.includes("civilian") || team === "")) return true;
            
            // STAFF FILTER: Checks ERLC Server Permissions for Mods, Admins, and Owners
            if (currentFilter === "staff" && (
                permission.includes("mod") || 
                permission.includes("admin") || 
                permission.includes("owner")
            )) return true;

            return false;
        }

        function renderMap() {
            const currentNames = [];
            let unitsDisplayed = 0;

            latestData.Players.forEach(p => {
                if (!checkFilterMatch(p)) return;

                const nameParts = p.Player.split(':');
                const cleanName = nameParts[0];
                const userId = nameParts[1] || "Unknown"; 
                const permission = p.Permission || "Normal";
                
                currentNames.push(cleanName);
                unitsDisplayed++;

                const y = 3120 - p.Location.LocationZ;
                const x = p.Location.LocationX;
                const color = getTeamColor(p.Team);
                const label = p.Callsign ? `${cleanName} [${p.Callsign}]` : cleanName;

                // Roblox strictly formats this specific URL to return the 150x150 Face Headshot
                const avatarUrl = userId !== "Unknown" 
                    ? `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=150&height=150&format=png`
                    : `https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png`;

                // Generate Staff Badge HTML if they have permissions
                let staffBadgeHTML = "";
                if (permission !== "Normal") {
                    staffBadgeHTML = `<span class="badge" style="background: #9333ea; border: 1px solid #c084fc;">${permission}</span>`;
                }

                const popupHTML = `
                    <div class="profile-popup">
                        <img src="${avatarUrl}" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png'">
                        <div class="info">
                            <h3>${cleanName}</h3>
                            <p><strong>ID:</strong> ${userId}</p>
                            <div class="badge-container">
                                <span class="badge" style="background: ${color}; color: #000;">${p.Team || "Civilian"}</span>
                                ${p.Callsign ? `<span class="badge" style="background: #333; border: 1px solid #555;">${p.Callsign}</span>` : ''}
                                ${staffBadgeHTML}
                            </div>
                        </div>
                    </div>
                `;

                if (markers[cleanName]) {
                    markers[cleanName].setLatLng([y, x]);
                    if (!markers[cleanName].isPopupOpen()) {
                        markers[cleanName].setPopupContent(popupHTML);
                    }
                } else {
                    markers[cleanName] = L.circleMarker([y, x], {
                        radius: 5,
                        color: color,
                        fillOpacity: 1,
                        weight: 2
                    }).addTo(map)
                      .bindTooltip(label, { permanent: true, direction: 'top', className: 'unit-label' })
                      .bindPopup(popupHTML);
                }
            });

            Object.keys(markers).forEach(name => {
                if (!currentNames.includes(name)) {
                    map.removeLayer(markers[name]);
                    delete markers[name];
                }
            });

            document.getElementById('stat-units').innerText = unitsDisplayed;
        }

        async function syncData() {
            try {
                const response = await fetch('/api/erlc-map-api');
                const data = await response.json();
                latestData = data; 

                document.getElementById('stat-pop').innerText = `${data.CurrentPlayers} / ${data.MaxPlayers}`;
                document.getElementById('stat-time').innerText = new Date().toLocaleTimeString();
                
                document.getElementById('sync-text').innerText = "LIVE CONNECTION";
                document.getElementById('sync-dot').classList.add('active');

                renderMap();

            } catch (err) {
                console.error("Map Sync Error:", err);
                document.getElementById('sync-text').innerText = "API ERROR";
                document.getElementById('sync-dot').classList.remove('active');
            }
        }

        setInterval(syncData, 10000);
        syncData();
    </script>
</body>
</html>
