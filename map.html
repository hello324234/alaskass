<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alaska State | Tactical Live Map</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --bg: #050505; --bg-soft: #0d0d11; --border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8; --accent: #38bdf8; --glass: rgba(15, 15, 18, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* Header Navigation */
        header { 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--bg-soft); 
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }
        
        .nav-brand { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; }
        .nav-stats { display: flex; gap: 30px; font-size: 0.85rem; font-weight: 600; color: var(--text-dim); }
        .nav-stats span b { color: white; }

        .status-pill { font-size: 0.7rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 50px; border: 1px solid var(--border); }
        .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
        .live-dot.active { background: #22c55e; box-shadow: 0 0 10px #22c55e; }

        /* Main Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }

        /* Sidebar Player List */
        .sidebar { width: 320px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
        .sidebar-header h2 { font-size: 0.9rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        
        .player-list { flex: 1; overflow-y: auto; padding: 10px; }
        .player-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px; 
            border-radius: 12px; cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; margin-bottom: 6px;
        }
        .player-item:hover { background: rgba(255,255,255,0.05); border-color: var(--border); }
        .player-item img { width: 38px; height: 38px; border-radius: 50%; background: #1a1a20; border: 1px solid var(--border); }
        .player-info { flex: 1; overflow: hidden; }
        .player-info .name { font-weight: 700; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .player-info .team { font-size: 0.7rem; font-weight: 600; opacity: 0.8; }

        /* Map Area */
        .map-wrapper { flex: 1; position: relative; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        #map-canvas { width: 100%; height: 100%; background: #08080a; }

        /* Leaflet Styling */
        .unit-label { background: rgba(0, 0, 0, 0.85); border: 1px solid var(--accent); color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; pointer-events: none; white-space: nowrap; }
        .leaflet-popup-content-wrapper { background: #0d0d11 !important; color: white !important; border: 1px solid var(--border); border-radius: 12px !important; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; width: 220px !important; }
        .leaflet-popup-tip { background: #0d0d11 !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-brand">ALASKA <span style="color: var(--accent)">STATE</span></div>
        <div class="nav-stats">
            <span>PLAYERS: <b id="stat-pop">0/0</b></span>
            <span>LAST FETCH: <b id="stat-time">--:--:--</b></span>
        </div>
        <div class="status-pill">
            <div id="sync-dot" class="live-dot"></div>
            <span id="sync-text">DISCONNECTED</span>
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Active Units</h2>
            </div>
            <div id="player-list-container" class="player-list">
                </div>
        </div>

        <div class="map-wrapper">
            <div id="map-canvas"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map-canvas', {
            crs: L.CRS.Simple,
            minZoom: -2,
            maxZoom: 1,
            zoomSnap: 0.1,
            attributionControl: false
        });

        const bounds = [[0, 0], [3120, 3120]];
        L.imageOverlay('https://alpha.duckybot.xyz/assets/erlc-map.png', bounds).addTo(map);
        map.fitBounds(bounds);

        let markers = {};

        function getTeamColor(team) {
            const t = team.toLowerCase();
            if (t.includes("police")) return "#38bdf8";
            if (t.includes("sheriff")) return "#fbbf24";
            if (t.includes("fire") || t.includes("ems")) return "#ef4444";
            if (t.includes("dot")) return "#f97316";
            return "#ffffff";
        }

        function focusPlayer(y, x, name) {
            map.flyTo([y, x], 0, { duration: 1 });
            setTimeout(() => {
                if (markers[name]) markers[name].openPopup();
            }, 1100);
        }

        async function syncData() {
            try {
                const response = await fetch('/api/erlc-map-api');
                if (!response.ok) throw new Error('API Fail');
                const data = await response.json();

                document.getElementById('stat-pop').innerText = `${data.CurrentPlayers} / ${data.MaxPlayers}`;
                document.getElementById('stat-time').innerText = new Date().toLocaleTimeString();
                document.getElementById('sync-text').innerText = "LIVE CONNECTION";
                document.getElementById('sync-dot').classList.add('active');

                const currentNames = [];
                const listContainer = document.getElementById('player-list-container');
                let listHTML = '';

                data.Players.forEach(p => {
                    const parts = p.Player.split(':');
                    const name = parts[0];
                    const userId = parts[1] || "1";
                    currentNames.push(name);

                    const y = 3120 - p.Location.LocationZ;
                    const x = p.Location.LocationX;
                    const color = getTeamColor(p.Team);
                    const label = p.Callsign ? `${name} [${p.Callsign}]` : name;
                    
                    // The most reliable Roblox avatar URL format
                    const avatarUrl = `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=150&height=150&format=png`;

                    const popupHTML = `
                        <div style="background: #0d0d11; border: 1px solid ${color}; padding: 15px; text-align: center;">
                            <img src="${avatarUrl}" style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid ${color}; margin-bottom: 10px;">
                            <div style="font-weight: 800; font-size: 14px; margin-bottom: 2px;">${name}</div>
                            <div style="font-size: 10px; color: ${color}; font-weight: 700; text-transform: uppercase; margin-bottom: 10px;">${p.Team}</div>
                            <div style="text-align: left; font-size: 11px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px;">
                                <div><b>Location:</b> ${p.Location.StreetName || 'Unknown'}</div>
                                <div><b>Postal:</b> ${p.Location.PostalCode || 'N/A'}</div>
                            </div>
                        </div>
                    `;

                    if (markers[name]) {
                        markers[name].setLatLng([y, x]);
                        markers[name].setPopupContent(popupHTML);
                    } else {
                        markers[name] = L.circleMarker([y, x], {
                            radius: 6, color: color, fillColor: color, fillOpacity: 1, weight: 2
                        }).addTo(map)
                          .bindTooltip(label, { permanent: true, direction: 'top', className: 'unit-label', offset: [0, -5] })
                          .bindPopup(popupHTML);
                    }

                    listHTML += `
                        <div class="player-item" onclick="focusPlayer(${y}, ${x}, '${name}')">
                            <img src="${avatarUrl}" alt="">
                            <div class="player-info">
                                <div class="name">${label}</div>
                                <div class="team" style="color: ${color}">${p.Team}</div>
                            </div>
                        </div>
                    `;
                });

                listContainer.innerHTML = listHTML;

                Object.keys(markers).forEach(name => {
                    if (!currentNames.includes(name)) {
                        map.removeLayer(markers[name]);
                        delete markers[name];
                    }
                });

            } catch (err) {
                document.getElementById('sync-text').innerText = "API ERROR";
                document.getElementById('sync-dot').classList.remove('active');
            }
        }

        setInterval(syncData, 5000); // Faster sync for better tracking
        syncData();
    </script>
</body>
</html>
