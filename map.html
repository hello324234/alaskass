<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alaska State | Tactical Live Map</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --bg: #050505;
            --bg-soft: #0d0d11;
            --glass: rgba(15, 15, 18, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --police: #2563eb;
            --sheriff: #d97706;
            --ems: #dc2626;
            --dot: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        /* Premium Navigation */
        .nav-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 1200px; z-index: 1000; }
        nav { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 100px; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: 800; letter-spacing: -0.5px; font-size: 1.1rem; }
        .status-pill { font-size: 0.75rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 6px 15px; border-radius: 50px; border: 1px solid var(--border); }
        .live-dot { width: 8px; height: 8px; background: #444; border-radius: 50%; }
        .live-dot.active { background: #22c55e; box-shadow: 0 0 10px #22c55e; }

        /* Layout */
        .wrapper { padding: 130px 5% 50px; max-width: 1600px; margin: 0 auto; }
        .header-area { text-align: center; margin-bottom: 40px; }
        
        /* Map Container */
        .map-card { background: var(--bg-soft); border: 1px solid var(--border); border-radius: 30px; padding: 20px; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        #map-canvas { 
            width: 100%; 
            height: 70vh; 
            border-radius: 20px; 
            background: #08080a;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* Marker Styling */
        .unit-label {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--border);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--bg-soft); border: 1px solid var(--border); padding: 20px; border-radius: 20px; }
        .stat-box small { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; font-weight: 700; }
        .stat-box div { font-size: 1.4rem; font-weight: 800; margin-top: 5px; color: var(--accent); }

        .leaflet-container { background: #050505 !important; }
    </style>
</head>
<body>

    <div class="nav-container">
        <nav>
            <div class="brand">ALASKA <span style="color: var(--accent)">STATE</span></div>
            <div class="status-pill">
                <div id="sync-dot" class="live-dot"></div>
                <span id="sync-text">INITIALIZING</span>
            </div>
        </nav>
    </div>

    <div class="wrapper">
        <div class="header-area">
            <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">Live Asset Tracking</h1>
            <p style="color: var(--text-dim);">Real-time GPS coordinate pinpointing for all active server units.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <small>Server Population</small>
                <div id="stat-pop">0 / 0</div>
            </div>
            <div class="stat-box">
                <small>Active Units</small>
                <div id="stat-units">0</div>
            </div>
            <div class="stat-box">
                <small>Last Data Fetch</small>
                <div id="stat-time">--:--:--</div>
            </div>
        </div>

        <div class="map-card">
            <div id="map-canvas"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize Map (Using Simple CRS for XY Coordinates)
        const map = L.map('map-canvas', {
            crs: L.CRS.Simple,
            minZoom: -4,
            maxZoom: 2,
            zoomControl: true
        });

        // Focus the map on the general area where players usually are
        map.setView([400, 200], -1);

        let markers = {};

        // 2. Color logic based on Team
        function getTeamColor(team) {
            if (team.includes("Police")) return "#2563eb";
            if (team.includes("Sheriff")) return "#d97706";
            if (team.includes("Fire") || team.includes("EMS")) return "#dc2626";
            if (team.includes("DOT")) return "#f59e0b";
            return "#ffffff"; // Civilian
        }

        // 3. Main Data Sync
        async function syncData() {
            const syncDot = document.getElementById('sync-dot');
            const syncText = document.getElementById('sync-text');

            try {
                // Fetch from your Vercel /api/erlc-map-api route
                const response = await fetch('/api/erlc-map-api');
                const data = await response.json();

                if (!data.Players) throw new Error("No data");

                // Update Stats
                document.getElementById('stat-pop').innerText = `${data.CurrentPlayers} / ${data.MaxPlayers}`;
                document.getElementById('stat-units').innerText = data.Players.length;
                document.getElementById('stat-time').innerText = new Date().toLocaleTimeString();
                
                syncText.innerText = "LIVE CONNECTION";
                syncDot.classList.add('active');

                const currentNames = [];

                data.Players.forEach(p => {
                    const cleanName = p.Player.split(':')[0];
                    currentNames.push(cleanName);

                    // Map Roblox Z/X to Leaflet Y/X
                    // We divide by 5 to bring the coordinates into a viewable web scale
                    const y = p.Location.LocationZ / 5;
                    const x = p.Location.LocationX / 5;
                    
                    const color = getTeamColor(p.Team);
                    const label = p.Callsign ? `${cleanName} [${p.Callsign}]` : cleanName;

                    if (markers[cleanName]) {
                        // Update existing marker position
                        markers[cleanName].setLatLng([y, x]);
                    } else {
                        // Create new marker
                        markers[cleanName] = L.circleMarker([y, x], {
                            radius: 7,
                            color: color,
                            fillOpacity: 1,
                            weight: 2
                        }).addTo(map).bindTooltip(label, {
                            permanent: true,
                            direction: 'top',
                            className: 'unit-label'
                        });
                    }
                });

                // Remove players who left the server
                Object.keys(markers).forEach(name => {
                    if (!currentNames.includes(name)) {
                        map.removeLayer(markers[name]);
                        delete markers[name];
                    }
                });

            } catch (err) {
                syncText.innerText = "API ERROR";
                syncDot.classList.remove('active');
                console.error("Sync error:", err);
            }
        }

        // Run sync every 10 seconds
        setInterval(syncData, 10000);
        syncData(); // Initial run
    </script>
</body>
</html>
